<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post — Toby Qian</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --paper: #efe7d6;
      --ink: #1a1a1a;
      --ink-soft: #3a3a3a;
      --ink-muted: #7a7266;
      --ink-line: rgba(26, 26, 26, 0.14);
      --accent: #a3283a;
      --serif: "Fraunces", "Instrument Serif", Georgia, serif;
      --sans: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      --mono: "JetBrains Mono", ui-monospace, monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: var(--paper); color: var(--ink); }
    body {
      font-family: var(--serif);
      font-size: 18px;
      line-height: 1.65;
      min-height: 100vh;
      padding: 40px clamp(20px, 6vw, 80px) 80px;
      max-width: 760px;
      margin: 0 auto;
    }
    .back {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-muted);
      text-decoration: none;
      padding: 8px 14px;
      border: 1px solid var(--ink-line);
      border-radius: 999px;
      transition: color 0.2s, border-color 0.2s;
    }
    .back:hover { color: var(--ink); border-color: var(--ink); }
    .meta {
      margin-top: 40px;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }
    h1 {
      margin-top: 14px;
      font-family: var(--serif);
      font-weight: 500;
      font-size: clamp(2.2rem, 5vw, 3.4rem);
      line-height: 1.1;
      letter-spacing: -0.01em;
    }
    h1 em { color: var(--accent); font-style: italic; }
    .lede {
      margin-top: 20px;
      font-family: "Instrument Serif", var(--serif);
      font-style: italic;
      font-size: clamp(1.2rem, 2.4vw, 1.5rem);
      color: var(--ink-soft);
      line-height: 1.4;
    }
    .divider {
      margin: 40px 0 32px;
      height: 1px;
      background: var(--ink-line);
    }
    article p {
      margin-bottom: 1.2em;
      color: var(--ink-soft);
    }
    article p::first-letter { font-size: 1em; }
    article h2 {
      margin: 2em 0 0.6em;
      font-family: var(--serif);
      font-weight: 500;
      font-size: 1.4rem;
      letter-spacing: -0.01em;
    }
    .stub {
      margin-top: 32px;
      padding: 24px;
      border: 1px dashed var(--ink-line);
      border-radius: 14px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--ink-muted);
      text-align: center;
      letter-spacing: 0.05em;
    }
    .footer-note {
      margin-top: 60px;
      padding-top: 24px;
      border-top: 1px solid var(--ink-line);
      font-family: var(--mono);
      font-size: 11px;
      color: var(--ink-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-align: center;
    }
  </style>
</head>
<body>

  <a class="back" href="index.html">← Back to issue</a>

  <div id="post"></div>

  <div class="footer-note">Toby Qian · Personal Press · Issue 01</div>

  <script>
    const POSTS = {
      "work-01": {
        kind: "WORK · 01",
        date: "2026",
        title: "Personal Press — <em>v1</em>",
        lede: "The first version of this site. A magazine pretending to be a homepage.",
        body: [
          "This is the project that started everything — or, more honestly, the project I made to have <em>anything</em> to put on a personal website. A little self-referential, but such is the web.",
          "I wanted something that felt less like a dashboard and more like a printed issue: big type, generous margins, a real sense of hierarchy. No framework, no build step, no database. Just HTML, CSS, and a little JavaScript, written by hand.",
          "Along the way I learned that the hardest part of a personal site isn't the code — it's deciding what to say. Turns out I don't have much, so here we are.",
          "More notes, typos and cover updates will appear here as I revise the issue. For now, this page is a placeholder with its boots on.",
        ],
      },
      "work-02": {
        kind: "WORK · 02",
        date: "2025",
        title: "Type specimen <em>studies</em>",
        lede: "Small, weekly explorations of typefaces I find online and pretend to understand.",
        body: [
          "Every week (well, sometimes every week) I pick a typeface and spend an evening pushing it around a page. Posters, headlines, ratios, absurd sizes — the kind of practice that doesn't produce a portfolio piece, but quietly builds an eye.",
          "The joy is in noticing what a designer left out: how a certain serif turns softer at 72pt, how a display cut stops working below 24pt. Boring from the outside, oddly addictive from the inside.",
          "This post is a stub. Real specimens will live here when I stop being lazy.",
        ],
      },
      "work-03": {
        kind: "WORK · 03",
        date: "2025",
        title: "CLI <em>scaffolds</em> for side projects",
        lede: "A tiny CLI that sets up the boring parts of a new idea so I can get bored somewhere else.",
        body: [
          "Every time I had a new idea, I'd spend an hour setting up the same skeleton. Git init, formatter, lint, a sensible folder structure, the works. Then by the time I was ready to <em>actually</em> think about the idea, the energy was gone.",
          "So I made a small command-line tool that does all of that in a few seconds. It's not impressive technology; it just gets me to the interesting part faster.",
          "Writeup coming. Probably. Eventually. When I feel like writing about a tool whose whole job is to save me from writing.",
        ],
      },
      "work-04": {
        kind: "WORK · 04",
        date: "2025",
        title: "Reading <em>journal</em>",
        lede: "A slow, personal reading log. Annotations, quotes, and the connections between them.",
        body: [
          "I read more than I remember, which is its own kind of waste. This is an attempt to fix that: a place where I write down not just what I read, but what it reminded me of, argued with, or quietly rearranged in my head.",
          "I'm resisting the urge to turn it into a review site. Nothing here is for anyone else — it's for the version of me who'll try to recall a good paragraph in six months and come up empty.",
          "Entries will show up here when they feel finished. If this page is empty, assume I'm still reading.",
        ],
      },
      "work-05": {
        kind: "WORK · 05",
        date: "2024",
        title: "Slow brand <em>system</em>",
        lede: "A warm, quiet identity for a friend's small studio — paper, ink, patience.",
        body: [
          "A friend runs a small studio out of a one-room space in an old building. They didn't need a logo that screamed — they needed a system that felt like the room itself: weathered paper, quiet ink, a little crooked on purpose.",
          "We spent more time on margins and line widths than on the mark itself. I think that's the right ratio for most small brands, and almost nobody gets it.",
          "Case study coming. In the meantime, this is a placeholder pretending to be a case study.",
        ],
      },
      "journal-01": {
        kind: "JOURNAL · 001",
        date: "Coming soon",
        title: "Hello — why this site <em>exists</em>",
        lede: "First entry. A little about the why behind this whole thing.",
        body: [
          "I didn't need a personal site. Nobody does. That's what makes having one interesting.",
          "This is a draft. Real words will replace these words when I figure out what I actually want to say. In the meantime, the placeholder is doing its best.",
          "Thanks for reading a page that hasn't really been written yet.",
        ],
      },
      "journal-02": {
        kind: "JOURNAL · 002",
        date: "Coming soon",
        title: "Notes from life in <em>Guangzhou</em>",
        lede: "Weather, late-night snacks, and small things that don't quite add up.",
        body: [
          "Guangzhou is wet in a way that soaks into your shoes and your vocabulary. You stop describing days as sunny or cloudy and start describing them as <em>sticky</em> or <em>bearable</em>.",
          "I keep meaning to write a proper piece about it — the streetside stalls, the loud-quiet of the metro, the particular flavor of a 2am rice noodle bowl. This is that intention, saved as a file.",
        ],
      },
      "journal-03": {
        kind: "JOURNAL · 003",
        date: "Coming soon",
        title: "Games worth <em>bragging</em> about",
        lede: "Not a review — just biased opinions.",
        body: [
          "I've played a lot of games. Most were forgettable. A few quietly rearranged how I think about time, attention, or why people build things at all.",
          "This post will eventually be about those few. For now, it's a stub defending its right to exist on a homepage.",
        ],
      },
      "journal-04": {
        kind: "JOURNAL · 004",
        date: "Coming soon",
        title: "How a student put himself on the <em>internet</em>",
        lede: "Notes on building this site — the mistakes and the lessons.",
        body: [
          "There's a specific kind of humility in shipping something public for the first time. You notice every typo twice, and the ones you don't notice, someone else will.",
          "I'll write down the mistakes I made building this — the CSS I broke, the git commit I had to undo, the paragraph I rewrote fifteen times. Not because it's useful to anyone, but because it's the kind of post I'd have liked to read before I started.",
        ],
      },
    };

    function render() {
      const id = new URLSearchParams(location.search).get("id");
      const post = POSTS[id];
      const root = document.getElementById("post");

      if (!post) {
        root.innerHTML = `
          <div class="meta">404</div>
          <h1>This page <em>doesn't exist</em>.</h1>
          <p class="lede">Or at least not yet. Try heading back to the home page.</p>
        `;
        document.title = "Not found — Toby Qian";
        return;
      }

      document.title = post.title.replace(/<[^>]+>/g, "") + " — Toby Qian";
      root.innerHTML = `
        <div class="meta">${post.kind} · ${post.date}</div>
        <h1>${post.title}</h1>
        <p class="lede">${post.lede}</p>
        <div class="divider"></div>
        <article>
          ${post.body.map(p => `<p>${p}</p>`).join("")}
        </article>
        <div class="stub">Placeholder content — real writing coming later.</div>
      `;
    }

    render();
  </script>
</body>
</html>
