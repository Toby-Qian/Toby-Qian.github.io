<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 280" aria-hidden="true">
  <defs>
    <radialGradient id="glass" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#fbf6ff"/>
      <stop offset="100%" stop-color="#cdb8e8"/>
    </radialGradient>
    <g id="floret">
      <ellipse cx="0" cy="-4.2" rx="2.5" ry="3.6"/>
      <ellipse cx="0" cy="4.2" rx="2.5" ry="3.6"/>
      <ellipse cx="-4.2" cy="0" rx="3.6" ry="2.5"/>
      <ellipse cx="4.2" cy="0" rx="3.6" ry="2.5"/>
      <circle r="1.6" fill="#fde68a"/>
    </g>
    <path id="leaf" d="M0 0 Q9 -7 18 0 Q9 7 0 0"/>
  </defs>

  <!-- ground shadow -->
  <ellipse cx="120" cy="268" rx="58" ry="7" fill="#2a2042" opacity=".08"/>

  <!-- stems -->
  <g stroke="#6f7f4d" stroke-width="2.4" fill="none" stroke-linecap="round">
    <path d="M120 198 C119 160 120 110 120 72"/>
    <path d="M117 198 C104 162 84 132 73 104"/>
    <path d="M123 198 C137 166 154 138 163 116"/>
  </g>

  <!-- leaves -->
  <g fill="#8a9a68">
    <use href="#leaf" transform="translate(98 152) rotate(-38)"/>
    <use href="#leaf" transform="translate(143 154) rotate(212) scale(.9)"/>
    <use href="#leaf" transform="translate(121 118) rotate(-12) scale(.75)"/>
  </g>

  <!-- center panicle -->
  <g>
    <use href="#floret" transform="translate(120 36) scale(.6)" fill="#cdb8e8"/>
    <use href="#floret" transform="translate(112 47) scale(.8)" fill="#b89ed9"/>
    <use href="#floret" transform="translate(128 48) scale(.75)" fill="#9c7fc4"/>
    <use href="#floret" transform="translate(106 60)" fill="#cdb8e8"/>
    <use href="#floret" transform="translate(120 60) scale(.9)" fill="#b89ed9"/>
    <use href="#floret" transform="translate(133 61) scale(.85)" fill="#cdb8e8"/>
    <use href="#floret" transform="translate(111 74) scale(.95)" fill="#9c7fc4"/>
    <use href="#floret" transform="translate(125 74)" fill="#cdb8e8"/>
    <use href="#floret" transform="translate(118 87) scale(.8)" fill="#b89ed9"/>
  </g>

  <!-- left panicle -->
  <g>
    <use href="#floret" transform="translate(72 70) scale(.55)" fill="#b89ed9"/>
    <use href="#floret" transform="translate(64 82) scale(.75)" fill="#cdb8e8"/>
    <use href="#floret" transform="translate(77 83) scale(.7)" fill="#9c7fc4"/>
    <use href="#floret" transform="translate(58 95) scale(.85)" fill="#b89ed9"/>
    <use href="#floret" transform="translate(71 96) scale(.9)" fill="#cdb8e8"/>
    <use href="#floret" transform="translate(83 96) scale(.7)" fill="#b89ed9"/>
    <use href="#floret" transform="translate(66 109) scale(.75)" fill="#9c7fc4"/>
    <use href="#floret" transform="translate(78 109) scale(.65)" fill="#cdb8e8"/>
  </g>

  <!-- right panicle -->
  <g>
    <use href="#floret" transform="translate(165 86) scale(.55)" fill="#cdb8e8"/>
    <use href="#floret" transform="translate(158 98) scale(.7)" fill="#9c7fc4"/>
    <use href="#floret" transform="translate(171 99) scale(.75)" fill="#b89ed9"/>
    <use href="#floret" transform="translate(153 111) scale(.8)" fill="#cdb8e8"/>
    <use href="#floret" transform="translate(166 112) scale(.85)" fill="#b89ed9"/>
    <use href="#floret" transform="translate(177 111) scale(.6)" fill="#9c7fc4"/>
    <use href="#floret" transform="translate(160 124) scale(.65)" fill="#cdb8e8"/>
  </g>

  <!-- ink bottle -->
  <rect x="100" y="176" width="40" height="8" rx="3" fill="#9c7fc4"/>
  <rect x="105" y="183" width="30" height="16" fill="url(#glass)" stroke="#7e63a8" stroke-width="1.5"/>
  <path d="M93 199 h54 a12 12 0 0 1 12 12 v40 a12 12 0 0 1 -12 12 h-54 a12 12 0 0 1 -12 -12 v-40 a12 12 0 0 1 12 -12 Z"
        fill="url(#glass)" stroke="#7e63a8" stroke-width="1.5"/>
  <!-- water -->
  <path d="M83 232 q18 -6 37 0 t37 0 v19 a12 12 0 0 1 -12 12 h-50 a12 12 0 0 1 -12 -12 Z" fill="#b89ed9" opacity=".4"/>
  <!-- glass highlight -->
  <rect x="91" y="208" width="5" height="38" rx="2.5" fill="#fff" opacity=".75"/>
  <!-- label tag, sticker style -->
  <g transform="translate(120 230) rotate(-4)">
    <rect x="-19" y="-11" width="38" height="22" rx="6" fill="#fff" stroke="#7e63a8" stroke-width="1.3" stroke-dasharray="3 3"/>
    <path d="M-11 -3 q6 -4 11 0 t11 0 M-11 5 q8 -4 15 0" stroke="#9c7fc4" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  </g>

  <!-- sparkles + drifting petals -->
  <g fill="#9c7fc4">
    <path d="M34 128 L37 138 L47 141 L37 144 L34 154 L31 144 L21 141 L31 138 Z"/>
    <path d="M206 62 L208 68 L214 70 L208 72 L206 78 L204 72 L198 70 L204 68 Z"/>
  </g>
  <ellipse cx="48" cy="70" rx="3" ry="2" fill="#cdb8e8" transform="rotate(-24 48 70)"/>
  <ellipse cx="196" cy="140" rx="3" ry="2" fill="#b89ed9" transform="rotate(18 196 140)"/>
</svg>
