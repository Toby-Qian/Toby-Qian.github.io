<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice" role="img" aria-label="A single line-drawn heart, sketched twice, on a soft lilac field.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4ecff"/>
      <stop offset="55%" stop-color="#efe2fb"/>
      <stop offset="100%" stop-color="#e9dcfa"/>
    </linearGradient>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="3"/>
      <feColorMatrix values="0 0 0 0 0.16  0 0 0 0 0.13  0 0 0 0 0.26  0 0 0 0.08 0"/>
    </filter>
  </defs>

  <rect width="600" height="400" fill="url(#bg)"/>
  <rect width="600" height="400" filter="url(#grain)" opacity="0.6"/>

  <!-- faint ruled lines, notebook feel -->
  <g stroke="#d8c4f0" stroke-width="0.8" opacity="0.55">
    <line x1="0" y1="80"  x2="600" y2="80"/>
    <line x1="0" y1="140" x2="600" y2="140"/>
    <line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="260" x2="600" y2="260"/>
    <line x1="0" y1="320" x2="600" y2="320"/>
  </g>

  <!-- two small floating hearts -->
  <g fill="none" stroke="#7e63a8" stroke-width="1.6" opacity="0.55" stroke-linecap="round" stroke-linejoin="round">
    <path d="M120 110 c -8 -10 -22 -10 -22 4 c 0 12 22 22 22 22 c 0 0 22 -10 22 -22 c 0 -14 -14 -14 -22 -4 z"/>
    <path d="M495 295 c -6 -8 -18 -8 -18 3 c 0 10 18 18 18 18 c 0 0 18 -8 18 -18 c 0 -11 -12 -11 -18 -3 z"/>
  </g>

  <!-- central single-line heart, hand-drawn feel -->
  <g transform="translate(300 210)">
    <path d="M -90 -28
             C -90 -78, -22 -90, 0 -42
             C 22 -90, 90 -78, 90 -28
             C 90 22, 18 70, 0 92
             C -18 70, -90 22, -90 -28 Z"
          fill="none" stroke="#a3283a" stroke-width="2.6"
          stroke-linecap="round" stroke-linejoin="round"/>
    <!-- second pass, slightly offset, gives a sketched look -->
    <path d="M -88 -26
             C -86 -72, -22 -86, 2 -40
             C 22 -88, 88 -74, 88 -26
             C 88 22, 18 68, 2 90"
          fill="none" stroke="#a3283a" stroke-width="1.1"
          stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
  </g>

  <!-- corner mark, matches site ✺ -->
  <text x="28" y="40"
        font-family="Caveat, 'DM Serif Display', cursive"
        font-size="22"
        fill="#7e63a8"
        opacity="0.7">✺ lilac diary</text>
</svg>
